name: Bootstrap side-huddle secrets

# One-shot: copies loom's Apple signing secrets to side-huddle.
# Delete this file after it runs successfully.
#
# Requires BOOTSTRAP_TOKEN secret in THIS repo:
#   gh secret set BOOTSTRAP_TOKEN --body "<pat>" -R kenotron-ms/amplifier-app-loom
#
# PAT needs: Fine-grained token → kenotron-ms/side-huddle → Secrets (read/write)

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy Apple signing secrets to side-huddle
        env:
          APPLE_CERTIFICATE_P12:       ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD:  ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_APP_PASSWORD:          ${{ secrets.APPLE_APP_PASSWORD }}
          GH_TOKEN:                    ${{ secrets.BOOTSTRAP_TOKEN }}
        run: |
          printf '%s' "$APPLE_CERTIFICATE_P12"      | gh secret set APPLE_CERTIFICATE_P12      -R kenotron-ms/side-huddle
          printf '%s' "$APPLE_CERTIFICATE_PASSWORD" | gh secret set APPLE_CERTIFICATE_PASSWORD -R kenotron-ms/side-huddle
          printf '%s' "$APPLE_APP_PASSWORD"         | gh secret set APPLE_APP_PASSWORD         -R kenotron-ms/side-huddle
          echo "✓ All three secrets copied to side-huddle"
